<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" type="image/png" href="/static/img/icon_planeador.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Planeador Académico{% endblock %} — Humboldt</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary":                    "#0041c6",
          "on-primary":                 "#ffffff",
          "primary-container":          "#2d5be3",
          "on-primary-container":       "#e2e5ff",
          "primary-fixed":              "#dce1ff",
          "primary-fixed-dim":          "#b6c4ff",
          "on-primary-fixed":           "#001550",
          "secondary":                  "#595e6b",
          "on-secondary":               "#ffffff",
          "secondary-container":        "#dde2f1",
          "on-secondary-container":     "#5f6471",
          "secondary-fixed":            "#dde2f1",
          "on-secondary-fixed":         "#161c26",
          "on-secondary-fixed-variant": "#414753",
          "tertiary":                   "#005c32",
          "on-tertiary":                "#ffffff",
          "tertiary-container":         "#0a7744",
          "on-tertiary-container":      "#9dfbbb",
          "tertiary-fixed":             "#98f6b7",
          "on-tertiary-fixed":          "#00210f",
          "background":                 "#fcf9f5",
          "on-background":              "#1c1c1a",
          "surface":                    "#fcf9f5",
          "on-surface":                 "#1c1c1a",
          "surface-variant":            "#e5e2de",
          "on-surface-variant":         "#434655",
          "surface-dim":                "#dcdad6",
          "surface-container-lowest":   "#ffffff",
          "surface-container-low":      "#f6f3ef",
          "surface-container":          "#f0edea",
          "surface-container-high":     "#ebe8e4",
          "surface-container-highest":  "#e5e2de",
          "inverse-surface":            "#31302e",
          "inverse-on-surface":         "#f3f0ec",
          "outline":                    "#747686",
          "outline-variant":            "#c4c5d7",
          "error":                      "#ba1a1a",
          "on-error":                   "#ffffff",
          "error-container":            "#ffdad6",
          "on-error-container":         "#93000a",
        },
        borderRadius: {
          "DEFAULT": "0.25rem", "lg": "0.5rem",
          "xl": "0.75rem", "full": "9999px"
        },
        spacing: {
          "xs":"4px","base":"8px","sm":"12px","md":"24px",
          "lg":"48px","xl":"80px","gutter":"24px",
          "margin-mobile":"16px","margin-desktop":"32px"
        },
        fontFamily: {
          "sans":       ["DM Sans","sans-serif"],
          "mono":       ["JetBrains Mono","monospace"],
          "label-mono": ["JetBrains Mono"],
        },
        fontSize: {
          "headline-sm":       ["20px",{lineHeight:"28px",fontWeight:"600"}],
          "headline-md":       ["24px",{lineHeight:"32px",fontWeight:"600"}],
          "display-lg-mobile": ["32px",{lineHeight:"40px",letterSpacing:"-0.02em",fontWeight:"700"}],
          "display-lg":        ["48px",{lineHeight:"56px",letterSpacing:"-0.02em",fontWeight:"700"}],
          "body-md":           ["14px",{lineHeight:"20px",fontWeight:"400"}],
          "body-lg":           ["16px",{lineHeight:"24px",fontWeight:"400"}],
          "button-text":       ["14px",{lineHeight:"20px",fontWeight:"600"}],
          "label-mono":        ["12px",{lineHeight:"16px",letterSpacing:"0.05em",fontWeight:"500"}],
        }
      }
    }
  }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background-color: #fcf9f5; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    /* Compatibilidad con clases legacy del CSS anterior */
    .card { @apply bg-surface-container-lowest rounded-xl border border-outline-variant/20 p-6; }
    .card-sm { @apply bg-surface-container-lowest rounded-xl border border-outline-variant/20 p-4; }
    .btn { @apply inline-flex items-center gap-2 px-4 py-2.5 rounded-lg font-button-text text-button-text border border-outline-variant/40 bg-surface text-on-surface transition-all active:scale-95; }
    .btn-primary { @apply bg-primary text-on-primary border-primary shadow-sm hover:shadow-md; }
    .btn-success { @apply bg-tertiary text-on-tertiary border-tertiary; }
    .btn-danger { @apply bg-error text-on-error border-error; }
    .btn-sm { @apply px-3 py-1.5 text-sm rounded-lg; }
    .btn-block { @apply w-full justify-center; }
    .badge { @apply inline-flex items-center px-2 py-0.5 rounded-full font-label-mono text-label-mono; }
    .badge-blue { @apply bg-primary-fixed text-on-primary-fixed; }
    .badge-green { @apply bg-tertiary-fixed text-on-tertiary-fixed; }
    .badge-amber { @apply bg-yellow-100 text-yellow-800; }
    .badge-red { @apply bg-error-container text-on-error-container; }
    .badge-gray { @apply bg-surface-container text-on-surface-variant; }
    .chip { @apply inline-flex items-center px-2.5 py-1 rounded-full text-xs font-mono border border-outline-variant/40 bg-surface text-on-surface; }
    .alert { @apply p-3 rounded-xl text-sm; }
    .alert-error { @apply bg-error-container text-on-error-container; }
    .alert-success { @apply bg-tertiary-fixed text-on-tertiary-fixed; }
    .alert-info { @apply bg-primary-fixed text-on-primary-fixed; }
    .form-group { @apply mb-4; }
    .form-label { @apply block text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-1.5; }
    input[type=text],input[type=password],input[type=email],input[type=number],select,textarea {
      @apply w-full px-3 py-2.5 rounded-lg bg-surface border border-outline-variant/40 text-on-surface font-body-md text-body-md focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all;
      font-size: 16px;
    }
    .stats-grid { @apply grid gap-3; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); }
    .stat-card { @apply bg-surface-container rounded-xl p-3; }
    .stat-num { @apply text-2xl font-bold text-on-surface; }
    .stat-label { @apply text-xs text-on-surface-variant mt-1; }
    .grid-2 { @apply grid grid-cols-1 md:grid-cols-2 gap-4; }
    .flex-between { @apply flex justify-between items-center; }
    .flex-center { @apply flex items-center; }
    .gap-8 { gap: 8px; }
    .gap-12 { gap: 12px; }
    .mt-8 { margin-top: 8px; }
    .mt-16 { margin-top: 16px; }
    .mt-24 { margin-top: 24px; }
    .mb-8 { margin-bottom: 8px; }
    .mb-16 { margin-bottom: 16px; }
    .text-muted { @apply text-on-surface-variant; }
    .text-small { @apply text-xs; }
    .text-mono { @apply font-mono; }
    .hidden { display: none !important; }
    .w-full { width: 100%; }
    .divider { @apply border-t border-outline-variant/20 my-5; }
    .loading::before { content:''; @apply inline-block w-4 h-4 border-2 border-outline-variant border-t-primary rounded-full animate-spin mr-2; }
    .chat-msg { @apply p-3 rounded-2xl text-sm max-w-[85%]; line-height: 1.55; }
    .chat-user { @apply bg-surface-container-highest text-on-surface self-end; border-bottom-right-radius: 4px; }
    .chat-bot { @apply bg-secondary-container/40 text-on-surface border border-outline-variant/20 self-start; border-bottom-left-radius: 4px; }
    .chat-container { @apply flex flex-col gap-4 overflow-y-auto; }
    .chat-typing { @apply flex gap-1 items-center bg-surface-container-low px-3 py-2 rounded-full border border-outline-variant/20; }
    .chat-typing span { @apply w-1.5 h-1.5 bg-primary/60 rounded-full; animation: typing 1.4s infinite; }
    .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-4px)} }
    .mic-btn { @apply inline-flex items-center justify-center w-9 h-9 rounded-full bg-primary-container text-on-primary-container transition-all active:scale-90; }
    .mic-btn.grabando { @apply bg-error text-on-error; animation: pulsar 1s infinite; }
    .mic-estado { @apply text-xs text-error mt-1 hidden; }
    .mic-estado.visible { display: block; }
    .drop-zone { @apply flex flex-wrap gap-1 p-2 min-h-[44px] rounded-xl transition-colors; }
    .drop-zone.drag-over { @apply bg-primary-fixed/30; }
    .tabs { @apply flex border-b border-outline-variant/20 mb-5; }
    .tab { @apply px-4 py-2 text-sm text-on-surface-variant border-b-2 border-transparent cursor-pointer transition-all; }
    .tab.active { @apply text-on-surface font-semibold border-primary; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .prog-item { @apply flex items-center gap-3 py-2.5 border-b border-outline-variant/20 text-sm; }
    .prog-sem { @apply font-mono text-xs text-on-surface-variant min-w-[60px]; }
    .prog-desc { @apply flex-1 text-on-surface; }
    @keyframes pulsar { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    /* Sidebar */
    .sidebar { @apply fixed top-0 left-0 bottom-0 w-[220px] bg-surface-container-lowest border-r border-outline-variant/20 flex flex-col py-5 z-50; }
    .nav-item { @apply flex items-center gap-2.5 px-5 py-2.5 text-sm text-on-surface-variant no-underline transition-all rounded-none cursor-pointer; }
    .nav-item:hover { @apply bg-surface-container-low text-on-surface; }
    .nav-item.active { @apply bg-primary-fixed text-on-primary-fixed font-semibold; }
    .nav-icon { @apply text-base w-5 text-center; }
    .main-content { @apply ml-[220px] p-8 max-w-[900px]; }
    .mobile-header { @apply hidden; }
    .mobile-nav { @apply hidden; }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main-content { @apply ml-0 p-4 pb-24 max-w-full; }
      .mobile-header { @apply flex items-center justify-between px-4 py-3 bg-surface-container-lowest border-b border-outline-variant/20 sticky top-0 z-40; }
      .mobile-nav { @apply flex fixed bottom-0 left-0 right-0 bg-surface-container-lowest border-t border-outline-variant/20 z-50 pb-safe; }
      .mobile-nav-item { @apply flex-1 flex flex-col items-center gap-0.5 py-2 text-on-surface-variant no-underline text-[10px]; }
      .mobile-nav-item.active { @apply text-primary; }
      .grid-2 { @apply grid-cols-1; }
      .stats-grid { grid-template-columns: repeat(3,1fr); }
    }
    h1 { @apply text-2xl font-bold text-on-surface mb-1; }
    h2 { @apply text-lg font-semibold text-on-surface mb-3; }
    h3 { @apply text-sm font-semibold text-on-surface mb-2; }
    .page-sub { @apply text-sm text-on-surface-variant mb-6; }
    .sidebar-logo { @apply px-5 pb-5 border-b border-outline-variant/20 mb-3; }
    .app-name { @apply text-sm font-bold text-on-surface; }
    .app-sub { @apply text-xs text-on-surface-variant mt-0.5; }
    .sidebar-bottom { @apply mt-auto px-5 pt-3 border-t border-outline-variant/20; }
    .user-info { @apply text-sm font-semibold text-on-surface; }
    .user-sub { @apply text-xs text-on-surface-variant; }
    .page-sub { margin-bottom: 24px; }
    .seccion-item { @apply bg-surface-container-lowest rounded-xl border border-outline-variant/20 p-3 mb-2; }
  </style>
  {% block head %}{% endblock %}
</head>
<body class="bg-background text-on-background min-h-screen">
{% block body %}{% endblock %}
<div class="fixed inset-0 pointer-events-none -z-10 bg-[radial-gradient(#dde2f1_0.5px,transparent_0.5px)] [background-size:24px_24px] opacity-10"></div>
</body>
</html>
